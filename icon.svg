<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1336"/>
      <stop offset="100%" stop-color="#1c2250"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#374df5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="290" rx="180" ry="140" fill="rgba(55,77,245,.12)"/>
  <!-- Trophy cup -->
  <path d="M180 160 h152 l-28 140 c-4 20-16 32-48 38 v28 h16 c8 0 14 6 14 14 v10 H226 v-10 c0-8 6-14 14-14 h16 v-28 c-32-6-44-18-48-38 Z" fill="url(#accent)" opacity=".9"/>
  <!-- Trophy shine -->
  <path d="M200 175 h112 l-22 120 c-3 16-13 26-34 32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2"/>
  <!-- Trophy handles -->
  <path d="M180 195 c-30 0-48 14-48 42 s18 42 48 42" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <path d="M332 195 c30 0 48 14 48 42 s-18 42-48 42" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <!-- Trophy base -->
  <rect x="212" y="366" width="88" height="16" rx="8" fill="url(#gold)"/>
  <rect x="196" y="378" width="120" height="20" rx="10" fill="url(#gold)"/>
  <!-- Star -->
  <polygon points="256,172 263,194 286,194 268,207 275,229 256,216 237,229 244,207 226,194 249,194" fill="url(#gold)"/>
  <!-- 2026 text -->
  <text x="256" y="348" text-anchor="middle" fill="rgba(255,255,255,.9)" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="900" letter-spacing="-1">2026</text>
  <!-- Corner dots -->
  <circle cx="80" cy="80" r="8" fill="rgba(55,77,245,.4)"/>
  <circle cx="432" cy="80" r="8" fill="rgba(6,182,212,.4)"/>
  <circle cx="80" cy="432" r="8" fill="rgba(6,182,212,.4)"/>
  <circle cx="432" cy="432" r="8" fill="rgba(55,77,245,.4)"/>
</svg>
